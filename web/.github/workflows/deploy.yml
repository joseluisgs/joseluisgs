name: 🚀 Deploy Docs (GitHub Actions)

on:
  push:
    branches:
      - nueva_web  # Rama de desarrollo actual
      - main       # Rama de producción definitiva
      - master     # Rama de producción alternativa

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 🛠️ Install Dependencies
        run: |
          pnpm install --no-frozen-lockfile

      - name: 🏗️ Build Docs
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |-
          pnpm run docs:build
          cp CNAME src/.vuepress/dist/ || true
          cp README.md src/.vuepress/dist/ || true
          cp LICENSE src/.vuepress/dist/ || true
          touch src/.vuepress/dist/.nojekyll

      - name: 📤 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src/.vuepress/dist
