name: Generate Pacman Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Crear el directorio dist antes de generar los archivos
      - name: create dist directory
        run: mkdir -p dist

      # Genera el SVG de Pac-Man basado en tus contribuciones
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # Forzamos a que se escriba en la carpeta dist
          svg_out_path: dist/pacman-contribution-graph.svg

      # Sube el contenido de 'dist' a la rama 'output'
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
