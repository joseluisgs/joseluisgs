name: Generate Pac-Man

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
    - master

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Genera la animación de Pac-Man usando la acción de Platane con paleta personalizada
      - name: generate github-contribution-grid-pacman.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-pacman.svg?palette=github-light&color_snake=#f5e050&color_dots=#ebedf0,#ffc414,#f2f2f2,#71306e,#231d1d
            dist/github-contribution-grid-pacman-dark.svg?palette=github-dark&color_snake=#f5e050&color_dots=#161b22,#ffc414,#f2f2f2,#71306e,#231d1d

      - name: push github-contribution-grid-pacman.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
