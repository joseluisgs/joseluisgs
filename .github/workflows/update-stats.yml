name: Update Stats Images

on:
  schedule:
    - cron: '0 0 * * *' # Cada noche a las 00:00
  workflow_dispatch: # Botón para ejecutar a mano

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. GENERAR STATS (ESTILO DISCORD)
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=joseluisgs&show_icons=true&title_color=7289da&icon_color=7289da&text_color=ffffff&bg_color=2c2f33&hide_border=true&count_private=true&locale=es
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. GENERAR STREAKS (ESTILO DISCORD)
      # Usamos la acción de DenverCoder1 que es la oficial del proyecto
      - name: Generate Streak Card
        uses: DenverCoder1/github-readme-streak-stats@master
        with:
          user: joseluisgs
          # Inyectamos tus colores exactos
          args: >
            --ring=7289da
            --fire=7289da
            --currStreakNum=7289da
            --sideNums=7289da
            --currStreakLabel=7289da
            --sideLabels=ffffff
            --dates=ffffff
            --background=2c2f33
            --hide_border=true
            --locale=es
      
      # Movemos el archivo generado por la acción de DenverCoder1 a tu carpeta profile
      - name: Move Streak Card
        run: |
          mkdir -p profile
          mv github-readme-streak-stats.svg profile/streaks.svg

      # 3. GUARDAR LOS ARCHIVOS EN TU REPO
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Charts updated: Stats & Streaks" || exit 0
          git push
