name: Update Stats Images

on:
  schedule:
    - cron: '0 0 * * *' # Se actualiza cada noche
  workflow_dispatch: # Botón para actualizar a mano

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # GENERAR TARJETA DE STATS (ESTILO DISCORD)
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=joseluisgs&show_icons=true&title_color=7289da&icon_color=7289da&text_color=ffffff&bg_color=2c2f33&hide_border=true&count_private=true&locale=es
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # GENERAR TARJETA DE STREAKS (ESTILO DISCORD CON LLAMA AZUL)
      - name: Generate Streak Card
        uses: bwagner5/github-readme-streak-stats-action@v1.0.1
        with:
          target-user: joseluisgs
          # Tus colores manuales para que la llama no sea naranja
          params: ring=7289da&fire=7289da&currStreakNum=7289da&sideNums=7289da&currStreakLabel=7289da&sideLabels=ffffff&dates=ffffff&background=2c2f33&hide_border=true&locale=es
          path: profile/streaks.svg

      # GUARDAR LOS ARCHIVOS EN TU REPO
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Charts updated" || exit 0
          git push
