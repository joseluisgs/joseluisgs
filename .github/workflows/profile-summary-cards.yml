name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Summary Cards
        # Usamos la acción pero NO dejamos que haga commit (por defecto no debería, pero vamos a asegurar)
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_NAME: joseluisgs
          THEME: discord_old_blurple

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Esto coge la carpeta que se acaba de crear en el servidor temporal
          publish_dir: ./profile-summary-card-output/discord_old_blurple
          publish_branch: output
          commit_message: "Update profile summary cards [skip ci]"
          # IMPORTANTE: Esto evita que se guarden archivos viejos
          keep_files: false

      - name: Cleanup local workspace
        # Este paso extra borra la carpeta del servidor antes de que el workflow termine
        # así no hay ninguna posibilidad de que GitHub intente guardarla en master
        run: rm -rf profile-summary-card-output
