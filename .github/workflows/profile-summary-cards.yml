name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# Forzamos a que todo el trabajo use Node 24 para evitar el aviso de obsolescencia
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_NAME: joseluisgs
          THEME: discord_old_blurple

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4 # Actualizado a v4 para mejor soporte de Node moderno
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./profile-summary-card-output/discord_old_blurple
          publish_branch: output
          commit_message: "Update profile summary cards [skip ci]"
