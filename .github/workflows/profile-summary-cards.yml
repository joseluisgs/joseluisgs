name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Temporary Branch
        # Creamos una rama temporal para que la acción "ensucie" aquí y no en master
        run: |
          git checkout -b temp-build-cards

      - name: Generate Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_NAME: joseluisgs
          THEME: discord_old_blurple
        with:
          AUTO_COMMIT: false

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Cogemos los archivos generados en la rama temporal
          publish_dir: ./profile-summary-card-output/discord_old_blurple
          publish_branch: output
          commit_message: "Update profile summary cards [skip ci]"

      - name: Delete Temporary Branch
        # Volvemos a master y nos aseguramos de que no hay rastro de la carpeta
        if: always()
        run: |
          git checkout master
          git branch -D temp-build-cards
          rm -rf profile-summary-card-output
