name: Deploy JoseluisGS Web

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🛠️ Install Dependencies
        run: |
          cd web
          pnpm install --no-frozen-lockfile

      - name: 🏗️ Build Docs
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: |
          cd web
          pnpm run docs:build
          cp CNAME src/.vuepress/dist/ || true
          cp README.md src/.vuepress/dist/ || true
          cp LICENSE src/.vuepress/dist/ || true
          touch src/.vuepress/dist/.nojekyll

      - name: 📤 Deploy to GitHub Pages (joseluisgs.github.io)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          repository-name: joseluisgs/joseluisgs.github.io
          branch: main
          folder: web/src/.vuepress/dist
          token: ${{ secrets.ACCESS_TOKEN }}